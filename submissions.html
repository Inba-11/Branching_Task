<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Submissions</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
    <style>
        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background: #FFF4E6;
            min-height: 100vh;
            padding: 36px 20px 60px;
            color: #1A1A2E;
        }

        
        .top-bar {
            max-width: 1100px;
            margin: 0 auto 24px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
            flex-wrap: wrap;
        }

        .top-bar-left {
            display: flex;
            align-items: center;
            gap: 14px;
        }

        .btn-back {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            background: #FFE4BE;
            color: #7A4010;
            border: 1px solid #F6C897;
            padding: 7px 15px;
            font-size: 13px;
            font-weight: 600;
            border-radius: 7px;
            cursor: pointer;
            text-decoration: none;
            transition: background 0.15s, border-color 0.15s;
        }
        .btn-back:hover { background: #FFDDB3; border-color: #F6A05C; }
        .btn-back i { font-size: 12px; color: #C8895A; }

        .page-title {
            font-size: 18px;
            font-weight: 700;
            color: #1A1A2E;
        }
        .count-badge {
            background: #FFE4BE;
            color: #7A4010;
            border: 1px solid #F6C897;
            border-radius: 999px;
            font-size: 12px;
            font-weight: 700;
            padding: 2px 10px;
            margin-left: 8px;
        }
        .btn-clear-all {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            background: #E8503A;
            color: #fff;
            border: none;
            padding: 9px 18px;
            font-size: 13px;
            font-weight: 700;
            border-radius: 7px;
            cursor: pointer;
            transition: background 0.15s, transform 0.12s;
            box-shadow: 0 2px 8px rgba(232, 80, 58, 0.25);
        }
        .btn-clear-all:hover { background: #C73D28; transform: translateY(-1px); }
        .btn-clear-all:active { transform: translateY(0); }
        .card {
            max-width: 1100px;
            margin: 0 auto;
            background: #FFF8EE;
            border-radius: 14px;
            border: 1.5px solid #F6C897;
            box-shadow: 0 4px 20px rgba(246, 160, 92, 0.12);
            overflow: hidden;
        }
        .table-wrapper {
            overflow-x: auto;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            min-width: 600px;
        }

        thead th {
            background: #F6C897;
            padding: 12px 16px;
            text-align: left;
            font-size: 11.5px;
            font-weight: 700;
            color: #7A4010;
            text-transform: uppercase;
            letter-spacing: 0.07em;
            border: 1px solid #1A1A2E;
            white-space: nowrap;
        }

        tbody td {
            padding: 11px 16px;
            font-size: 13px;
            color: #1A1A2E;
            border: 1px solid #1A1A2E;
            vertical-align: middle;
        }

        tbody tr:hover { background: #FFF0D9; }

        .td-id {
            font-size: 13px;
            color: #1A1A2E;
            white-space: nowrap;
        }

        .td-date {
            white-space: nowrap;
            color: #1A1A2E;
            font-size: 13px;
        }

        .td-value {
            max-width: 260px;
            word-break: break-word;
        }

        .value-array {
            display: flex;
            flex-wrap: wrap;
            gap: 4px;
        }

        .tag {
            background: #FFE4BE;
            color: #7A4010;
            border: 1px solid #F6C897;
            border-radius: 4px;
            padding: 2px 8px;
            font-size: 11px;
            font-weight: 600;
        }

        .empty-val { color: #C8895A; font-style: italic; }
        .btn-del-row {
            background: none;
            border: none;
            color: #E8503A;
            cursor: pointer;
            font-size: 15px;
            padding: 4px 6px;
            border-radius: 5px;
            transition: background 0.15s;
        }
        .btn-del-row:hover { background: #FFE0D6; }
        .empty-state {
            text-align: center;
            padding: 64px 28px;
        }
        .empty-state i { font-size: 40px; margin-bottom: 16px; display: block; color: #F6C897; }
        .empty-state p { font-size: 14px; color: #C8895A; }
        .toast {
            position: fixed;
            bottom: 28px;
            left: 50%;
            transform: translateX(-50%) translateY(20px);
            background: #1A1A2E;
            color: #fff;
            padding: 12px 24px;
            border-radius: 10px;
            font-size: 13px;
            font-weight: 500;
            box-shadow: 0 4px 20px rgba(26, 26, 46, 0.25);
            display: flex;
            align-items: center;
            gap: 8px;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s, transform 0.3s;
            z-index: 9999;
            white-space: nowrap;
        }
        .toast.show {
            opacity: 1;
            transform: translateX(-50%) translateY(0);
        }
        .toast i { color: #4ade80; }
    </style>
</head>
<body>
    <div class="top-bar">
        <div class="top-bar-left">
            <a href="home.html" class="btn-back">
                <i class="fa-solid fa-arrow-left"></i> Back
            </a>
            <div>
                <span class="page-title" id="pageTitle">Submissions</span>
            </div>
        </div>
        <button id="btnClearAll" class="btn-clear-all" onclick="clearAll()">
            <i class="fa-solid fa-trash"></i> Clear All
        </button>
    </div>
    <div class="card">
        <div class="table-wrapper">
            <table id="subTable">
                <thead id="subHead">
                    <tr id="subHeadRow"></tr>
                </thead>
                <tbody id="subBody"></tbody>
            </table>
        </div>
    </div>
    <div class="toast" id="toast">
        <i class="fa-solid fa-circle-check"></i>
        <span id="toastMsg">Done</span>
    </div>

    <script>
        const params = new URLSearchParams(window.location.search);
        const formId = params.get("formId") || "";

        const SUBMIT_KEY = "submitted_forms";
        const FORMS_KEY  = "forms";
        let formName = "Untitled Form";
        try {
            const _forms = JSON.parse(localStorage.getItem(FORMS_KEY)) || [];
            const _form  = _forms.find(function (f) { return String(f.id) === String(formId); });
            if (_form && _form.formName) formName = _form.formName;
        } catch (e) {}

        document.title = "Submissions — " + formName;
        document.getElementById("pageTitle").textContent = formName;
        function getFormEntry() {
            try {
                const all = JSON.parse(localStorage.getItem(SUBMIT_KEY)) || [];
                return all.find(function (e) { return String(e.formId) === String(formId); }) || null;
            } catch (e) { return null; }
        }

        function saveFormEntry(entry) {
            try {
                const all = JSON.parse(localStorage.getItem(SUBMIT_KEY)) || [];
                const idx = all.findIndex(function (e) { return String(e.formId) === String(formId); });
                if (idx !== -1) all[idx] = entry;
                else all.push(entry);
                localStorage.setItem(SUBMIT_KEY, JSON.stringify(all));
            } catch (e) {}
        }
        function getFieldMeta() {
            try {
                const forms = JSON.parse(localStorage.getItem(FORMS_KEY)) || [];
                const form  = forms.find(function (f) { return String(f.id) === String(formId); });
                if (!form) return [];
                return (form.components || [])
                    .filter(function (c) {
                        return !c.deletedAt &&
                               c.type !== "SUBMIT" &&
                               !c.properties.hideOnly;
                    })
                    .map(function (c) {
                        return { id: String(c.id), label: c.properties.label };
                    });
            } catch (e) { return []; }
        }
        function fmtDate(iso) {
            if (!iso) return "—";
            try {
                const d = new Date(iso);
                return d.toLocaleDateString() + " " + d.toLocaleTimeString([], { hour: "2-digit", minute: "2-digit" });
            } catch (e) { return iso; }
        }
        function render() {
            const entry = getFormEntry();
            const headRow = document.getElementById("subHeadRow");
            const tbody   = document.getElementById("subBody");
            headRow.innerHTML = "";
            tbody.innerHTML   = "";
            const fields = getFieldMeta();
            if (!entry || !entry.submission || entry.submission.length === 0) {
                buildHeader(headRow, fields);
                tbody.innerHTML = `<tr><td colspan="${3 + fields.length}" style="text-align:center;padding:60px 20px;">
                    <div class="empty-state">
                        <i class="fa-regular fa-folder-open"></i>
                        <p>No submissions yet for this form.</p>
                    </div>
                </td></tr>`;
                return;
            }
            const active = entry.submission.filter(function (s) { return !s.isDeleted; });
            buildHeader(headRow, fields);
            if (active.length === 0) {
                tbody.innerHTML = `<tr><td colspan="${3 + fields.length}" style="text-align:center;padding:60px 20px;">
                    <div class="empty-state">
                        <i class="fa-regular fa-folder-open"></i>
                        <p>No active submissions.</p>
                    </div>
                </td></tr>`;
                return;
            }
            active.forEach(function (sub) {
                const tr = document.createElement("tr");
                const tdId = document.createElement("td");
                tdId.className = "td-id";
                tdId.textContent = sub.id;
                tr.appendChild(tdId);
                const tdDate = document.createElement("td");
                tdDate.className = "td-date";
                tdDate.textContent = fmtDate(sub.createdAt);
                tr.appendChild(tdDate);
                const valMap = {};
                (sub.submisionValues || []).forEach(function (sv) {
                    valMap[sv.componentId] = sv.value;
                });
                fields.forEach(function (f) {
                    const tdVal = document.createElement("td");
                    tdVal.className = "td-value";
                    const raw = valMap[f.label];
                    if (raw === undefined || raw === null || raw === "") {
                        tdVal.innerHTML = '<span class="empty-val">—</span>';
                    } else if (Array.isArray(raw)) {
                        if (raw.length === 0) {
                            tdVal.innerHTML = '<span class="empty-val">—</span>';
                        } else {
                            const wrap = document.createElement("div");
                            wrap.className = "value-array";
                            raw.forEach(function (v) {
                                const tag = document.createElement("span");
                                tag.className = "tag";
                                tag.textContent = v;
                                wrap.appendChild(tag);
                            });
                            tdVal.appendChild(wrap);
                        }
                    } else {
                        tdVal.textContent = raw;
                    }
                    tr.appendChild(tdVal);
                });
                const tdAct = document.createElement("td");
                tdAct.style.textAlign = "center";
                const delBtn = document.createElement("button");
                delBtn.className = "btn-del-row";
                delBtn.title = "Delete this submission";
                delBtn.innerHTML = '<i class="fa-solid fa-trash-can"></i>';
                delBtn.onclick = (function (subId) {
                    return function () { deleteSubmission(subId); };
                })(sub.id);
                tdAct.appendChild(delBtn);
                tr.appendChild(tdAct);

                tbody.appendChild(tr);
            });
        }

        function buildHeader(headRow, fields) {
            function th(text) {
                const el = document.createElement("th");
                el.textContent = text;
                return el;
            }
            headRow.appendChild(th("ID"));
            headRow.appendChild(th("Submitted At"));
            fields.forEach(function (f) { headRow.appendChild(th(f.label)); });
            headRow.appendChild(th("")); 
        }
        function deleteSubmission(subId) {
            if (!confirm("Delete this submission?")) return;
            const entry = getFormEntry();
            if (!entry) return;
            const sub = entry.submission.find(function (s) { return String(s.id) === String(subId); });
            if (!sub) return;
            sub.isDeleted  = true;
            sub.updatedAt  = new Date().toISOString();
            saveFormEntry(entry);
            showToast("Submission deleted.");
            render();
        }
        function clearAll() {
            if (!confirm("Delete ALL submissions for this form? This cannot be undone.")) return;
            const entry = getFormEntry();
            if (!entry) return;
            const now = new Date().toISOString();
            entry.submission.forEach(function (s) {
                s.isDeleted = true;
                s.updatedAt = now;
            });
            saveFormEntry(entry);
            showToast("All submissions cleared.");
            render();
        }
        function showToast(msg) {
            const toast = document.getElementById("toast");
            document.getElementById("toastMsg").textContent = msg;
            toast.classList.add("show");
            setTimeout(function () { toast.classList.remove("show"); }, 3000);
        }
        render();
    </script>
</body>

</html>
