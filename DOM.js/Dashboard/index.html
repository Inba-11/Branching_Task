<!DOCTYPE html>
<html>
<head>
<title>Finance Dashboard</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="main">
    <div class="sidebar">
        <h2 class="logo">Finance</h2>
        <ul>
            <li>Dashboard</li>
            <li>Pages</li>
            <li>Applications</li>
            <li>Forms</li>
            <li>Charts</li>
        </ul>
    </div>
    <div class="right">
        <div class="topbar">
            <input class="search" type="text" placeholder="Search here...">
            <div class="icons">
                <img src="bell.svg" class="icon">
                <img src="msg.svg" class="icon">
                <img src="client_img.png" class="profile">
            </div>
        </div>
        <div class="cards">
            <div class="card blue">
                <p>Total Income</p>
                <h2>$579,000</h2>
                <span>Saved 25%</span>
            </div>
            <div class="card sky">
                <p>Total Expenses</p>
                <h2>$79,000</h2>
                <span>Saved 25%</span>
            </div>
            <div class="card purple">
                <p>Cash on Hand</p>
                <h2>$92,000</h2>
                <span>Saved 25%</span>
            </div>
            <div class="card green">
                <p>Net Profit Margin</p>
                <h2>$179,000</h2>
                <span>Saved 65%</span>
            </div>
        </div>
        <div class="bottom">
            <div class="box large">
                <h3>Chart</h3>
            </div>

            <div class="box small">
                <h3>Income Budget</h3>
                <p>67%</p>
            </div>

            <div class="box small">
                <h3>Expenses Budget</h3>
                <p>48%</p>
            </div>

        </div>

    </div>

</div>

</body>
</html>
