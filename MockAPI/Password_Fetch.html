<!DOCTYPE html>
<html>
<head>
    <title>Password Strength Analyzer</title>
</head>
<body>
    <h2>Password Strength Analyzer</h2>
    <input type="text" id="passwordInput" placeholder="Enter password"
        oninput="document.getElementById('passwordInput').style.border=''" />
    <button onclick="handleButtonClick()" id="button">Analyze</button>
    <button onclick="cancelEdit()" id="cancelBtn" style="display:none;">Cancel</button>
    <button onclick="clearAll()">Clear All</button>
    <select id="sortField">
        <option value="createdAt">Created At</option>
        <option value="updatedAt">Updated At</option>
    </select>
    <select id="sortOrder">
        <option value="asc">Ascending</option>
        <option value="desc">Descending</option>
    </select>
    <button onclick="showResults()">Sort</button>
    <p id="statusMsg"></p>
    <table border="1">
        <thead>
            <tr>
                <th>Password</th>
                <th>Strength</th>
                <th>Created At</th>
                <th>Updated At</th>
                <th>Customize</th>
            </tr>
        </thead>
        <tbody></tbody>
    </table>

    <div id="summary"></div>
    <script src="./script.js"></script>
</body>
</html>
